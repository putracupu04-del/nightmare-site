<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Music Player</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color: transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:-apple-system, BlinkMacSystemFont, sans-serif;
color:white;
}

/* 🎬 Background Video */
#bg-video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
z-index:-2;
}

/* Dark overlay biar UI kebaca */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
z-index:-1;
}

/* Main Container */
.container{
position:relative;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

/* Album */
.cover{
width:85%;
max-width:320px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* Text */
.title{
font-size:20px;
font-weight:600;
margin-bottom:5px;
text-align:center;
}

.artist{
opacity:0.8;
margin-bottom:20px;
}

/* Progress */
.progress{
width:85%;
margin-bottom:20px;
}

input[type=range]{
width:100%;
accent-color:white;
}

/* Controls */
.controls{
display:flex;
align-items:center;
justify-content:center;
gap:35px;
}

.controls button{
background:none;
border:none;
color:white;
font-size:26px;
cursor:pointer;
}

.play-btn{
background:white;
color:black;
width:70px;
height:70px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
}
</style>
</head>

<body>

<!-- 🎬 VIDEO -->
<video autoplay muted loop playsinline id="bg-video">
<source src="0a8421fb-c52b-44ab-817e-abaa0690eb03.mov" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

<img src="cover.jpg" class="cover">

<div class="title">Now Playing</div>
<div class="artist">Nightmare Player</div>

<div class="progress">
<input type="range" id="seek" value="0">
</div>

<div class="controls">
<button onclick="shuffle()">🔀</button>
<button onclick="prev()">⏮</button>
<button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
<button onclick="next()">⏭</button>
</div>

</div>

<audio id="audio"></audio>

<script>
const songs = [
"ssstik.io_1772528554497.mp3",
"ssstik.io_1772532413917.mp3",
"ssstik.io_1772533528856.mp3",
"ssstik.io_1772534144291.mp3",
"ssstik.io_1772534217973.mp3",
"ssstik.io_1772534458180.mp3",
"ssstik.io_1772534591516.mp3",
"ssstik.io_1772534005836.mp3"
];

let index = 0;
let isShuffle = false;

const audio = document.getElementById("audio");
const seek = document.getElementById("seek");
const playBtn = document.getElementById("playBtn");

function loadSong(){
audio.src = songs[index];
}

function togglePlay(){
if(audio.paused){
audio.play();
playBtn.innerHTML="⏸";
}else{
audio.pause();
playBtn.innerHTML="▶";
}
}

function next(){
if(isShuffle){
index = Math.floor(Math.random()*songs.length);
}else{
index = (index+1)%songs.length;
}
loadSong();
audio.play();
playBtn.innerHTML="⏸";
}

function prev(){
index = (index-1+songs.length)%songs.length;
loadSong();
audio.play();
playBtn.innerHTML="⏸";
}

function shuffle(){
isShuffle=!isShuffle;
alert("Shuffle: "+(isShuffle?"ON":"OFF"));
}

audio.addEventListener("timeupdate", ()=>{
if(audio.duration){
seek.value=(audio.currentTime/audio.duration)*100;
}
});

seek.addEventListener("input", ()=>{
if(audio.duration){
audio.currentTime=(seek.value/100)*audio.duration;
}
});

audio.addEventListener("ended", next);

window.addEventListener("load", ()=>{
loadSong();
audio.play().catch(()=>{});
playBtn.innerHTML="⏸";
});

/* 🔒 Anti Zoom iPhone */
document.addEventListener('gesturestart', e => e.preventDefault());
document.addEventListener('touchmove', e => {
if(e.scale !== 1){ e.preventDefault(); }
}, { passive:false });
</script>

</body>
</html>
