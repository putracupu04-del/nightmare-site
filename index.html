<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nightmare Player</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
background:url("IMG_0638.jpeg") center/cover no-repeat;
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
color:white;
overflow:hidden;
}

/* Overlay gelap */
body::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:0;
}

/* PLAYER GLASS */
.player{
position:fixed;
bottom:0;
width:100%;
padding:15px 15px 20px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(15px);
-webkit-backdrop-filter:blur(15px);
border-top:1px solid rgba(255,255,255,0.2);
z-index:2;
}

/* Progress */
input[type=range]{
width:100%;
accent-color:red;
}

/* Controls */
.controls{
display:flex;
justify-content:center;
align-items:center;
gap:30px;
margin-top:10px;
}

.controls button{
background:none;
border:none;
font-size:24px;
cursor:pointer;
color:white;
transition:0.3s;
}

.controls button:hover{
transform:scale(1.2);
color:red;
}
</style>
</head>

<body>

<audio id="audio" src="ssstik.io_1772528554497.mp3"></audio>

<div class="player">

<input type="range" id="seek" value="0">

<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="play()">▶</button>
<button onclick="pause()">⏸</button>
<button onclick="next()">⏭</button>
</div>

</div>

<script>
const songs = ["ssstik.io_1772528554497.mp3"];
let index = 0;

const audio = document.getElementById("audio");
const seek = document.getElementById("seek");

function play(){
audio.play();
}

function pause(){
audio.pause();
}

function next(){
index = (index + 1) % songs.length;
audio.src = songs[index];
audio.play();
}

function prev(){
index = (index - 1 + songs.length) % songs.length;
audio.src = songs[index];
audio.play();
}

/* Update progress */
audio.addEventListener("timeupdate", ()=>{
if(audio.duration){
seek.value = (audio.currentTime / audio.duration) * 100;
}
});

/* Seek manual */
seek.addEventListener("input", ()=>{
if(audio.duration){
audio.currentTime = (seek.value / 100) * audio.duration;
}
});
</script>

</body>
</html>
