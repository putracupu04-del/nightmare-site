<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nightmare Player</title>

<style>
body{
margin:0;
height:100vh;
background:url("IMG_0638.jpeg") center/cover no-repeat;
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

/* OVERLAY GELAP */
body::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:0;
}

/* PLAYER BAR */
.player{
position:fixed;
bottom:0;
width:100%;
background:white;
padding:15px 10px;
box-shadow:0 -5px 20px rgba(0,0,0,0.4);
z-index:2;
}

/* PROGRESS */
.progress{
width:100%;
}

input[type=range]{
width:100%;
}

/* CONTROL BUTTON */
.controls{
display:flex;
justify-content:center;
align-items:center;
gap:25px;
margin-top:10px;
}

.controls button{
background:none;
border:none;
font-size:22px;
cursor:pointer;
}

.controls button:hover{
transform:scale(1.2);
}
</style>
</head>

<body>

<h1 style="position:relative;z-index:1;">NIGHTMARE MODE</h1>

<audio id="audio"></audio>

<div class="player">
  <div class="progress">
    <input type="range" id="seek" value="0">
  </div>

  <div class="controls">
    <button onclick="prev()">⏮</button>
    <button onclick="play()">▶</button>
    <button onclick="pause()">⏸</button>
    <button onclick="next()">⏭</button>
  </div>
</div>

<script>
const songs = [
 "lagu1.mp3",
 "lagu2.mp3"
];

let index = 0;
const audio = document.getElementById("audio");
const seek = document.getElementById("seek");

audio.src = songs[index];

function play(){
 audio.play();
}

function pause(){
 audio.pause();
}

function next(){
 index = (index + 1) % songs.length;
 audio.src = songs[index];
 audio.play();
}

function prev(){
 index = (index - 1 + songs.length) % songs.length;
 audio.src = songs[index];
 audio.play();
}

/* UPDATE PROGRESS */
audio.addEventListener("timeupdate", ()=>{
 seek.value = (audio.currentTime / audio.duration) * 100;
});

/* SEEK MANUAL */
seek.addEventListener("input", ()=>{
 audio.currentTime = (seek.value / 100) * audio.duration;
});
</script>

</body>
</html>
