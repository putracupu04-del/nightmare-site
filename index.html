<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anime Portal</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: url('IMG_0638.jpeg') no-repeat center center/cover;
color:white;
overflow:hidden;
position:relative;
}

/* Overlay gelap */
body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:0;
}

.box{
position:relative;
z-index:1;
background:rgba(0,0,0,0.5);
padding:40px;
border-radius:15px;
text-align:center;
}

h1{
font-size:28px;
margin-bottom:15px;
}

button{
padding:10px 25px;
border:none;
border-radius:20px;
background:red;
color:white;
cursor:pointer;
}

button:hover{
background:white;
color:black;
}
</style>
</head>

<body>

<div class="box">
<h1>Welcome To Anime Mode 🔥</h1>
<button onclick="alert('Activated 😈')">Enter</button>
</div>
<audio autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>
</body>
</html>
