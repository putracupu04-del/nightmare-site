<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nightmare Dimension</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Orbitron', sans-serif;
}

body{
    height:100vh;
    background: black url("IMG_0638.jpeg") center/cover no-repeat;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:white;
}

.overlay{
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.75);
}

.container{
    position:relative;
    text-align:center;
    animation:fadeIn 2s ease-in-out;
}

h1{
    font-size:45px;
    letter-spacing:3px;
    animation:glitch 1.5s infinite;
}

p{
    margin-top:15px;
    opacity:0.7;
}

button{
    margin-top:25px;
    padding:12px 25px;
    background:#ff004c;
    border:none;
    color:white;
    font-size:16px;
    cursor:pointer;
    border-radius:8px;
    transition:0.3s;
}

button:hover{
    background:#ff3366;
    transform:scale(1.1);
}

@keyframes fadeIn{
    from{opacity:0; transform:scale(0.9);}
    to{opacity:1; transform:scale(1);}
}

@keyframes glitch{
    0%{text-shadow:2px 2px red;}
    25%{text-shadow:-2px -2px blue;}
    50%{text-shadow:2px -2px red;}
    75%{text-shadow:-2px 2px blue;}
    100%{text-shadow:2px 2px red;}
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="container">
    <h1>NIGHTMARE</h1>
    <p>Klik tombol untuk masuk ke dimensi lain...</p>
    <button onclick="playMusic()">ENTER</button>
</div>

<audio id="bgm" loop>
  <source src="ssstik.io_1772528554497.mp3" type="audio/mpeg">
</audio>

<script>
function playMusic(){
    document.getElementById("bgm").play();
}
</script>

</body>
</html>
