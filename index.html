<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nightmare Player</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
background:url("IMG_0638.jpeg") center/cover no-repeat;
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* Overlay */
body::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
z-index:0;
}

/* PLAYER */
.player{
position:fixed;
bottom:0;
width:100%;
padding:15px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(15px);
border-top:1px solid rgba(255,255,255,0.2);
z-index:2;
color:white;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:25px;
margin-top:10px;
}

.controls button{
background:none;
border:none;
font-size:22px;
color:white;
cursor:pointer;
}

/* MENU TITIK TIGA */
.menu-btn{
position:absolute;
right:15px;
top:15px;
font-size:22px;
cursor:pointer;
}

.menu{
display:none;
margin-top:15px;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
}

.menu label{
font-size:14px;
display:block;
margin-top:10px;
}

input[type=range]{
width:100%;
accent-color:red;
}
</style>
</head>

<body>

<audio id="audio" src="ssstik.io_1772528554497.mp3"></audio>

<div class="player">

<input type="range" id="seek" value="0">

<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="play()">▶</button>
<button onclick="pause()">⏸</button>
<button onclick="next()">⏭</button>
</div>

<div class="menu-btn" onclick="toggleMenu()">⋮</div>

<div class="menu" id="menu">
<label>🔊 Volume</label>
<input type="range" id="volume" min="0" max="1" step="0.01" value="1">

<label>🎚 Bass Boost</label>
<input type="range" id="bass" min="0" max="20" step="1" value="0">
</div>

</div>

<script>
const audio = document.getElementById("audio");
const seek = document.getElementById("seek");
const volume = document.getElementById("volume");
const bassControl = document.getElementById("bass");

let audioContext = new (window.AudioContext || window.webkitAudioContext)();
let source = audioContext.createMediaElementSource(audio);
let gainNode = audioContext.createGain();
let bassFilter = audioContext.createBiquadFilter();

bassFilter.type = "lowshelf";
bassFilter.frequency.value = 200;

source.connect(bassFilter);
bassFilter.connect(gainNode);
gainNode.connect(audioContext.destination);

function play(){
audioContext.resume();
audio.play();
}

function pause(){ audio.pause(); }

function next(){ audio.currentTime = 0; audio.play(); }

function prev(){ audio.currentTime = 0; audio.play(); }

/* Progress */
audio.addEventListener("timeupdate", ()=>{
if(audio.duration){
seek.value = (audio.currentTime / audio.duration) * 100;
}
});

seek.addEventListener("input", ()=>{
if(audio.duration){
audio.currentTime = (seek.value / 100) * audio.duration;
}
});

/* Volume */
volume.addEventListener("input", ()=>{
gainNode.gain.value = volume.value;
});

/* Bass */
bassControl.addEventListener("input", ()=>{
bassFilter.gain.value = bassControl.value;
});

/* Toggle menu */
function toggleMenu(){
let menu = document.getElementById("menu");
menu.style.display = menu.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
