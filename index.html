<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sky Player</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial;
color:white;
touch-action:manipulation;
}

/* 🌌 LANGIT BACKGROUND */
.sky{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(to top,#0f2027,#203a43,#2c5364);
overflow:hidden;
z-index:-3;
}

/* ☁ Awan */
.cloud{
position:absolute;
background:rgba(255,255,255,0.08);
border-radius:50%;
filter:blur(40px);
animation:moveCloud linear infinite;
}

.cloud:nth-child(1){
width:400px;height:200px;
top:20%;
left:-400px;
animation-duration:60s;
}

.cloud:nth-child(2){
width:600px;height:250px;
top:50%;
left:-600px;
animation-duration:90s;
}

.cloud:nth-child(3){
width:300px;height:150px;
top:70%;
left:-300px;
animation-duration:75s;
}

@keyframes moveCloud{
from{transform:translateX(0);}
to{transform:translateX(160vw);}
}

/* ☀ Glow Matahari */
.sun-glow{
position:fixed;
top:15%;
left:50%;
transform:translateX(-50%);
width:500px;
height:500px;
background:radial-gradient(circle, rgba(255,200,120,0.25), transparent 70%);
filter:blur(60px);
animation:pulse 6s infinite ease-in-out;
z-index:-2;
}

@keyframes pulse{
0%{opacity:0.4;}
50%{opacity:0.8;}
100%{opacity:0.4;}
}

/* 🎵 Player */
.player{
position:absolute;
bottom:70px;
width:100%;
display:flex;
flex-direction:column;
align-items:center;
}

.progress{width:85%;margin-bottom:20px;}

input[type=range]{
width:100%;
appearance:none;
height:3px;
background:rgba(255,255,255,0.4);
border-radius:5px;
}

input[type=range]::-webkit-slider-thumb{
appearance:none;
width:14px;
height:14px;
background:white;
border-radius:50%;
}

.controls{
display:flex;
align-items:center;
justify-content:center;
gap:35px;
}

.controls button{
background:none;
border:none;
color:white;
font-size:26px;
cursor:pointer;
opacity:0.9;
}

.play-btn{
background:white;
color:black;
width:70px;
height:70px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
}
</style>
</head>

<body>

<div class="sky">
<div class="cloud"></div>
<div class="cloud"></div>
<div class="cloud"></div>
</div>

<div class="sun-glow"></div>

<div class="player">
<div class="progress">
<input type="range" id="seek" value="0">
</div>

<div class="controls">
<button onclick="prev()">⏮</button>
<button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
<button onclick="next()">⏭</button>
</div>
</div>

<audio id="audio"></audio>

<script>
const songs=[
"ssstik.io_1772528554497.mp3",
"ssstik.io_1772532413917.mp3",
"ssstik.io_1772533528856.mp3",
"ssstik.io_1772534144291.mp3",
"ssstik.io_1772534217973.mp3",
"ssstik.io_1772534458180.mp3",
"ssstik.io_1772534591516.mp3",
"ssstik.io_1772534005836.mp3",
"DJ TERI MERI BBHC SLOWED & REVERB (128).mp3",
"ssstik.io_1772549862953.mp3"
];

let index=0;
const audio=document.getElementById("audio");
const seek=document.getElementById("seek");
const playBtn=document.getElementById("playBtn");

function loadSong(){
audio.src=songs[index];
}

function togglePlay(){
if(audio.paused){
audio.play();
playBtn.innerHTML="⏸";
}else{
audio.pause();
playBtn.innerHTML="▶";
}
}

function next(){
index=(index+1)%songs.length;
loadSong();
audio.play();
playBtn.innerHTML="⏸";
}

function prev(){
index=(index-1+songs.length)%songs.length;
loadSong();
audio.play();
playBtn.innerHTML="⏸";
}

audio.addEventListener("timeupdate",()=>{
if(audio.duration){
seek.value=(audio.currentTime/audio.duration)*100;
}
});

seek.addEventListener("input",()=>{
if(audio.duration){
audio.currentTime=(seek.value/100)*audio.duration;
}
});

window.addEventListener("load",loadSong);

/* LOCK ZOOM */
document.addEventListener('gesturestart', e => e.preventDefault());
let lastTouchEnd=0;
document.addEventListener('touchend', function (event) {
let now=(new Date()).getTime();
if(now-lastTouchEnd<=300){event.preventDefault();}
lastTouchEnd=now;
}, false);
document.addEventListener('touchmove', function(e){
if(e.scale!==1){e.preventDefault();}
},{passive:false});
</script>

</body>
</html>
