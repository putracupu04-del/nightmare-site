<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">

<!-- 🔒 Disable Zoom Total -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Nightmare Player</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color: transparent;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
font-family:Arial, sans-serif;
touch-action: manipulation;
}

/* ===== VIDEO BACKGROUND ===== */
#bg-video{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:cover;
z-index:-2;
}

/* Overlay */
body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.25);
z-index:-1;
}

/* ===== PLAYER ===== */
.player{
position:fixed;
bottom:0;
width:100%;
padding:20px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(18px);
border-top:1px solid rgba(255,255,255,0.2);
color:white;
text-align:center;
}

.controls{
margin-top:15px;
}

.controls button{
background:rgba(255,0,0,0.7);
border:none;
padding:12px 25px;
border-radius:30px;
font-size:16px;
color:white;
cursor:pointer;
transition:0.3s;
}

.controls button.off{
background:rgba(150,150,150,0.6);
}

.playlist-btn{
position:absolute;
right:15px;
top:15px;
font-size:18px;
cursor:pointer;
}

.playlist{
display:none;
margin-top:15px;
max-height:160px;
overflow-y:auto;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
text-align:left;
}

.playlist div{
padding:8px;
cursor:pointer;
border-radius:6px;
}

.playlist div:hover{
background:rgba(255,0,0,0.3);
}

.active-song{
background:rgba(255,0,0,0.5);
}

input[type=range]{
width:100%;
accent-color:red;
}
</style>
</head>

<body>

<!-- BACKGROUND VIDEO -->
<video autoplay muted loop playsinline id="bg-video">
<source src="0a8421fb-c52b-44ab-817e-abaa0690eb03.mov" type="video/mp4">
</video>

<audio id="audio"></audio>

<div class="player">

<input type="range" id="seek" value="0">

<div class="controls">
<button id="toggleBtn" onclick="toggleAudio()">🔊 ON</button>
</div>

<div class="playlist-btn" onclick="togglePlaylist()">📂</div>
<div class="playlist" id="playlist"></div>

</div>

<script>
const songs = [
"ssstik.io_1772528554497.mp3",
"ssstik.io_1772532413917.mp3",
"ssstik.io_1772533528856.mp3",
"ssstik.io_1772534144291.mp3",
"ssstik.io_1772534217973.mp3",
"ssstik.io_1772534458180.mp3",
"ssstik.io_1772534591516.mp3",
"ssstik.io_1772534005836.mp3"
];

let index = 0;
const audio = document.getElementById("audio");
const toggleBtn = document.getElementById("toggleBtn");
const seek = document.getElementById("seek");
const playlist = document.getElementById("playlist");

function loadPlaylist(){
playlist.innerHTML="";
songs.forEach((song,i)=>{
let item=document.createElement("div");
item.textContent=song;
item.onclick=()=>{
index=i;
loadSong();
audio.play();
updateButton();
};
if(i===index) item.classList.add("active-song");
playlist.appendChild(item);
});
}

function loadSong(){
audio.src=songs[index];
}

function toggleAudio(){
if(audio.paused){
audio.play();
toggleBtn.textContent="🔊 ON";
toggleBtn.classList.remove("off");
}else{
audio.pause();
toggleBtn.textContent="🔇 OFF";
toggleBtn.classList.add("off");
}
}

function updateButton(){
if(audio.paused){
toggleBtn.textContent="🔇 OFF";
toggleBtn.classList.add("off");
}else{
toggleBtn.textContent="🔊 ON";
toggleBtn.classList.remove("off");
}
}

function togglePlaylist(){
playlist.style.display=
playlist.style.display==="block"?"none":"block";
}

audio.addEventListener("timeupdate", ()=>{
if(audio.duration){
seek.value=(audio.currentTime/audio.duration)*100;
}
});

seek.addEventListener("input", ()=>{
if(audio.duration){
audio.currentTime=(seek.value/100)*audio.duration;
}
});

audio.addEventListener("ended", ()=>{
index=(index+1)%songs.length;
loadSong();
audio.play();
loadPlaylist();
});

window.addEventListener("load", ()=>{
loadSong();
audio.play().catch(()=>{});
updateButton();
loadPlaylist();
});

/* 🔒 HARD LOCK ZOOM iPHONE */
document.addEventListener('gesturestart', function (e) {
    e.preventDefault();
});

let lastTouchEnd = 0;
document.addEventListener('touchend', function (event) {
    const now = (new Date()).getTime();
    if (now - lastTouchEnd <= 300) {
        event.preventDefault();
    }
    lastTouchEnd = now;
}, false);

document.addEventListener('touchmove', function(event) {
    if (event.scale !== 1) {
        event.preventDefault();
    }
}, { passive: false });
</script>

</body>
</html>
