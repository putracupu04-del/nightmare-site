<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nightmare Player</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

#bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

body::after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
z-index:-1;
}

.player{
position:fixed;
bottom:0;
width:100%;
padding:15px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(15px);
border-top:1px solid rgba(255,255,255,0.2);
color:white;
}

.controls{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-top:10px;
}

.controls button{
background:none;
border:none;
font-size:20px;
color:white;
cursor:pointer;
}

.playlist-btn{
position:absolute;
right:15px;
top:15px;
font-size:18px;
cursor:pointer;
}

.playlist{
display:none;
margin-top:15px;
max-height:150px;
overflow-y:auto;
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
}

.playlist div{
padding:8px;
cursor:pointer;
border-radius:6px;
}

.playlist div:hover{
background:rgba(255,0,0,0.3);
}

.active-song{
background:rgba(255,0,0,0.5);
}

input[type=range]{
width:100%;
accent-color:red;
}
</style>
</head>

<body>

<video autoplay muted loop playsinline id="bg-video">
<source src="0a8421fb-c52b-44ab-817e-abaa0690eb03.mov" type="video/quicktime">
</video>

<audio id="audio"></audio>

<div class="player">

<input type="range" id="seek" value="0">

<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="pause()">⏸</button>
<button onclick="play()">▶</button>
<button onclick="next()">⏭</button>
</div>

<div class="playlist-btn" onclick="togglePlaylist()">📂</div>
<div class="playlist" id="playlist"></div>

</div>

<script>
const songs = [
"ssstik.io_1772528554497.mp3",
"ssstik.io_1772532413917.mp3",
"ssstik.io_1772533528856.mp3",
"ssstik.io_1772534144291.mp3",
"ssstik.io_1772534217973.mp3",
"ssstik.io_1772534458180.mp3",
"ssstik.io_1772534591516.mp3",
"ssstik.io_1772534005836.mp3"
];

let index = 0;
const audio = document.getElementById("audio");
const seek = document.getElementById("seek");
const playlist = document.getElementById("playlist");

function loadPlaylist(){
playlist.innerHTML="";
songs.forEach((song,i)=>{
let item=document.createElement("div");
item.textContent=song;
item.onclick=()=>{
index=i;
playSong();
};
if(i===index) item.classList.add("active-song");
playlist.appendChild(item);
});
}

function playSong(){
audio.src=songs[index];
audio.play();
loadPlaylist();
}

function play(){ audio.play(); }
function pause(){ audio.pause(); }

function next(){
index=(index+1)%songs.length;
playSong();
}

function prev(){
index=(index-1+songs.length)%songs.length;
playSong();
}

function togglePlaylist(){
playlist.style.display=
playlist.style.display==="block"?"none":"block";
}

window.addEventListener("load", ()=>{
playSong();
});

audio.addEventListener("ended", ()=>{
next();
});

audio.addEventListener("timeupdate", ()=>{
if(audio.duration){
seek.value=(audio.currentTime/audio.duration)*100;
}
});

seek.addEventListener("input", ()=>{
if(audio.duration){
audio.currentTime=(seek.value/100)*audio.duration;
}
});

loadPlaylist();
</script>

</body>
</html>
